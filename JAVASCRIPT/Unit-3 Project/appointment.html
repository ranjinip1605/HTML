<html lang="en">
<head>

<style>

/* HERO */

.hero{

/* FORM CARD */

.container{

justify-content:center;

}

.form-card{

.form-card h2{

}

/* INPUTS */

label{

}
header{

color:white;
padding:20px;
text-align:center;
font-size:22px;
letter-spacing:1px;
}

nav{
background:#085a86;
padding:12px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
}

nav a{
color:white;
margin:0 18px;
text-decoration:none;
font-weight:bold;
font-size:15px;
transition:0.3s;
}

nav a:hover{
color:#ffd700;
}
input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:5px;

}

.gender{

}

.success{

footer{

</style>
</head>

<body>

<header>
<h1>CityCare Hospital</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="doctors.html">Doctors</a>

</nav>

<div class="hero">
Book Your Appointment
</div>

<div class="container">

<div class="form-card">

<h2>Appointment Booking</h2>

<form id="appointmentForm">

<label>Patient Name</label>
<input type="text" id="name" required>

<label>Age</label>
<input type="number" id="age" required>

<label>Gender</label>
<div class="gender">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
</div>

<label>Weight (kg)</label>
<input type="number" id="weight" required>

<label>Select Doctor</label>
<select id="doctor">
<option>Dr. Ramesh Kumar - Cardiologist</option>
<option>Dr. Anitha Rao - Pediatrician</option>
<option>Dr. Suresh - Orthopedic</option>
<option>Dr. Kavitha Nair - Gynecologist</option>
<option>Dr. Arjun Patel - Neurologist</option>
<option>Dr. Priya Sharma - Dermatologist</option>
<option>Dr. Rahul Verma - General Physician</option>
<option>Dr. Neha Gupta - ENT Specialist</option>
<option>Dr. Vikram Singh - Urologist</option>
<option>Dr. Sneha Iyer - Ophthalmologist</option>
</select>

<label>Date of Appointment</label>
<input type="date" id="date" required>

<label>Phone Number</label>
<input type="text" id="phone" placeholder="10 digit number" required>

<button type="submit">Book Appointment</button>

</form>

<div class="success" id="successMsg">
✅ Appointment booked successfully!
</div>

</div>

</div>

<footer>
<p>© 2026 CityCare Hospital | 24/7 Emergency Care</p>
<p>Phone: +91 98765 43210 | Email: citycarehospital@gmail.com</p>
</footer>

<script>

/* FORM VALIDATION */

document.getElementById("appointmentForm").addEventListener("submit",function(e){

e.preventDefault();

let phone=document.getElementById("phone").value;

if(phone.length!=10){

alert("Please enter a valid 10 digit phone number");

return;

}

/* SAVE DATA */

let appointment={
name:document.getElementById("name").value,
age:document.getElementById("age").value,
doctor:document.getElementById("doctor").value,
date:document.getElementById("date").value,
phone:phone
};

localStorage.setItem("appointment",JSON.stringify(appointment));

document.getElementById("successMsg").style.display="block";

document.getElementById("appointmentForm").reset();

});

</script>

</body>
</html>
